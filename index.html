<h2>Request Your Free Pickup</h2>

<form action="https://formspree.io/f/mvzeapzd" method="POST">

<label>Full Name</label><br>
<input type="text" name="full_name" required><br><br>

<label>Phone Number</label><br>
<input type="tel" name="phone" required><br><br>

<label>Email</label><br>
<input type="email" name="email" required><br><br>

<label>Appliance Type</label><br>
<input type="text" name="appliance" placeholder="Washer, Dryer, Refrigerator, Stove" required><br><br>

<label>Pickup Address</label><br>
<input type="text" name="address" required><br><br>

<label>Message</label><br>
<textarea name="message" placeholder="Tell us about the appliance"></textarea><br><br>

<button type="submit">Request Free Pickup</button>

</form>
