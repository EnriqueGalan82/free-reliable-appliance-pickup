<h2>Request Your Free Appliance Pickup</h2>

<form action="https://formspree.io/f/mvzeapzd" method="POST">

<label>Full Name</label><br>
<input type="text" name="name" placeholder="Enter your full name" required>
<br><br>

<label>Phone Number</label><br>
<input type="tel" name="phone" placeholder="Enter your phone number" required>
<br><br>

<label>Email Address (optional)</label><br>
<input type="email" name="email" placeholder="Enter your email">
<br><br>

<label>Appliance Type</label><br>
<select name="appliance" required>
<option value="">Select appliance</option>
<option>Washer</option>
<option>Dryer</option>
<option>Refrigerator</option>
<option>Freezer</option>
<option>Stove / Range</option>
<option>Other</option>
</select>
<br><br>

<label>Appliance Condition</label><br>
<select name="condition" required>
<option value="">Select condition</option>
<option>Fully functioning</option>
<option>Needs some repair</option>
<option>Broken / Junk</option>
</select>
<br><br>

<label>Pickup Address</label><br>
<input type="text" name="address" placeholder="Street address where appliance is located" required>
<br><br>

<label>City</label><br>
<input type="text" name="city" placeholder="City" required>
<br><br>

<label>State</label><br>
<input type="text" name="state" placeholder="State (example: Oregon)" required>
<br><br>

<label>Message</label><br>
<textarea name="message" rows="5" placeholder="Tell us about the appliance"></textarea>
<br><br>

<button type="submit">Request Free Pickup</button>

</form>
