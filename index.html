<section id="request">

<h2>Request Free Appliance Pickup</h2>

<p>
Fill out the form below. We will review your appliance information and contact you to schedule pickup.
</p>

<form>

<input type="text" placeholder="Your Name" required>

<input type="tel" placeholder="Phone Number" required>

<input type="email" placeholder="Email Address (Optional)">

<input type="text" placeholder="Street Address" required>

<input type="text" placeholder="City" required>

<input type="text" placeholder="State" required>

<input type="text" placeholder="ZIP Code" required>


<select required>
<option value="">Select Appliance</option>
<option>Refrigerator</option>
<option>Washer</option>
<option>Dryer</option>
<option>Stove / Range</option>
<option>Freezer</option>
<option>Dishwasher</option>
<option>Multiple Appliances</option>
</select>


<h3>Appliance Condition</h3>

<p>Is the appliance fully working?</p>

<select required>
<option value="">Choose One</option>
<option>Yes - Fully working</option>
<option>No - Needs some repair</option>
<option>No - Junk / Not working</option>
</select>


<textarea placeholder="Tell us about your appliance (brand, model, quantity, age, and any details)"></textarea>


<button type="submit">
Submit Pickup Request
</button>


</form>

</section>
