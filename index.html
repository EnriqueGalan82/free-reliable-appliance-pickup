<h2>Request Your Free Appliance Pickup</h2>

<form action="https://formspree.io/f/mvzeapzd" method="POST">

  <label>Full Name:</label><br>
  <input type="text" name="name" required><br><br>

  <label>Phone Number:</label><br>
  <input type="tel" name="phone" required><br><br>

  <label>Email Address (optional):</label><br>
  <input type="email" name="email"><br><br>

  <label>Appliance Type:</label><br>
  <input type="text" name="appliance" placeholder="Washer, Dryer, Refrigerator, Stove, Freezer..." required><br><br>

  <label>Appliance Condition:</label><br>

  <input type="radio" name="condition" value="Fully functioning" required>
  <label>Fully functioning</label><br>

  <input type="radio" name="condition" value="Needs some repair">
  <label>Needs some repair</label><br>

  <input type="radio" name="condition" value="Junk or scrap">
  <label>Junk or scrap</label><br><br>

  <label>Message:</label><br>
  <textarea name="message" rows="5" placeholder="Please tell us more about the appliance and pickup location" required></textarea><br><br>

  <button type="submit">Request Free Pickup</button>

</form>
